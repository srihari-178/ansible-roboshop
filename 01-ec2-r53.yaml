---
- name: create ec2-instance and route53
  hosts: local
  connection: local
  vars:
    ami_id: ami-0220d79f3f480ecf5
    sg_id: sg-01a442727975ec0a6
    zone_id: "Z02070743H1ELHQWA5ZC8"
    domain_name: "sriharidevops17.online"
    instances:
      - mongodb
      - redis
      - mysql
  tasks:
    - name: create ec2 instance
      amazon.aws.ec2_instance:
        name: "{{ item }}"
        instance_type: t3.micro
        security_group: "{{ sg_id }}"
        image_id: "{{ ami_id }}"
        tags:
          Name: "{{ item }}"
      loop: "{{ instances }}"
      register: ec2_output

    - name: print the ec2 output
      ansible.builtin.debug:
        msg: "{{ ec2_output }}"

    - name: create route 53 record
      amazon.aws.route53:
        state: present
        zone: "{{domain_name}}"
        record: "{{ item.item }}.{{ domain_name }}" #mongodb.sriharidevops17.online
        type: A
        ttl: 1
        value: "{{ item.instances[0].private_ip_address }}"
        overwrite: true
      loop: "{{ ec2_output.results }}"

